<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>全球地震显示系统 - 真实昼夜模拟 | 动态光照</title>
    <!-- 百度翻译 MD5 签名库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <!-- 高德地图 API -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=f1f6aa55ebd83d9d79f187965c06c5a6"></script>
    <script src="https://webapi.amap.com/loca?v=2.0&key=f1f6aa55ebd83d9d79f187965c06c5a6"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, 'Segoe UI', '微软雅黑', sans-serif;
            background: #0a0a2a;
            overflow-x: hidden;
        }
        .header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a3e 0%, #0a0a2a 100%);
            color: white;
            border-bottom: 1px solid #333;
            position: relative;
            z-index: 10;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .subtitle {
            color: #aaa;
            font-size: 14px;
        }
        .time-info {
            margin-top: 8px;
            font-size: 13px;
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 24px;
            backdrop-filter: blur(4px);
            font-family: monospace;
        }
        .maps-container {
            display: flex;
            height: 500px;
            border-bottom: 2px solid #333;
            background: #000011;
        }
        .globe-box, .mercator-box {
            flex: 1;
            position: relative;
            background: #000011;
        }
        .mercator-box {
            background: #eaf7ff;
        }
        .map-label {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.65);
            color: white;
            padding: 5px 12px;
            border-radius: 24px;
            font-size: 12px;
            z-index: 20;
            pointer-events: none;
            backdrop-filter: blur(4px);
            font-weight: 500;
        }
        .data-section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .stats {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 18px 30px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            min-width: 140px;
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #ff6b6b;
        }
        .stat-label {
            color: #ccc;
            margin-top: 8px;
            font-size: 14px;
        }
        .quake-list {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }
        .quake-header {
            display: grid;
            grid-template-columns: 100px 1fr 180px 100px;
            background: #1a1a3e;
            color: white;
            padding: 14px 16px;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }
        .quake-item {
            display: grid;
            grid-template-columns: 100px 1fr 180px 100px;
            padding: 12px 16px;
            border-bottom: 1px solid #222;
            transition: background 0.2s;
            color: #ddd;
        }
        .quake-item:hover {
            background: rgba(255,255,255,0.08);
        }
        .magnitude { font-weight: bold; }
        .m-strong { color: #ff4444; }
        .m-mid { color: #ff8844; }
        .m-light { color: #44ff44; }
        .place { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .time { font-size: 13px; color: #999; }
        .tsunami {
            font-size: 12px;
            padding: 2px 10px;
            border-radius: 20px;
            display: inline-block;
        }
        .tsunami-yes { background: #ff5722; color: white; }
        .tsunami-no { background: #444; color: #aaa; }
        .loading, .error { text-align: center; padding: 40px; color: #aaa; }
        
        @media (max-width: 900px) {
            .maps-container { flex-direction: column; height: auto; }
            .globe-box, .mercator-box { min-height: 400px; }
            .quake-header, .quake-item { grid-template-columns: 70px 1fr 130px 70px; font-size: 12px; }
        }
        
        .light-tip {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            color: #ffdd99;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            pointer-events: none;
            z-index: 20;
            font-family: monospace;
        }

        .filter-panel {
            max-width: 1400px;
            margin: 20px auto;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }

        .filter-title {
            color: white;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-label {
            color: #aaa;
            font-size: 13px;
            font-weight: 500;
        }

        .filter-input, .filter-select {
            padding: 10px 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            font-size: 13px;
            font-family: inherit;
        }

        .filter-input:focus, .filter-select:focus {
            outline: none;
            border-color: rgba(255,200,100,0.5);
            background: rgba(0,0,0,0.5);
        }

        .filter-input::placeholder {
            color: #666;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .filter-btn-apply {
            background: linear-gradient(135deg, #ff6b6b, #ff8c8c);
            color: white;
        }

        .filter-btn-apply:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(255,107,107,0.3);
        }

        .filter-btn-reset {
            background: rgba(255,255,255,0.1);
            color: #aaa;
        }

        .filter-btn-reset:hover {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        .filter-message {
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 10px;
        }

        .filter-message.error {
            background: rgba(255,107,107,0.2);
            color: #ff8c8c;
            border: 1px solid rgba(255,107,107,0.3);
        }

        .filter-message.success {
            background: rgba(76,175,80,0.2);
            color: #90EE90;
            border: 1px solid rgba(76,175,80,0.3);
        }

        .filter-message.info {
            background: rgba(100,150,255,0.2);
            color: #87CEEB;
            border: 1px solid rgba(100,150,255,0.3);
        }

        /* 地震详情弹窗样式 */
        .quake-detail-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            z-index: 10000;
            backdrop-filter: blur(4px);
        }

        .quake-detail-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .quake-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 15px;
        }

        .quake-detail-title {
            font-size: 24px;
            font-weight: bold;
            color: #ff6b6b;
        }

        .quake-detail-close {
            background: none;
            border: none;
            color: #aaa;
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quake-detail-close:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .quake-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .quake-detail-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .quake-detail-label {
            color: #aaa;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .quake-detail-value {
            color: white;
            font-size: 16px;
            font-weight: 600;
        }

        .quake-detail-description {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            border-left: 4px solid #ff6b6b;
        }

        .quake-detail-description h4 {
            color: #ff6b6b;
            margin: 0 0 10px 0;
            font-size: 16px;
        }

        .quake-detail-description p {
            color: #ddd;
            line-height: 1.6;
            margin: 0;
            font-size: 14px;
        }

        .quake-item-major {
            cursor: pointer;
            transition: all 0.3s;
        }

        .quake-item-major:hover {
            background: rgba(255,107,107,0.1);
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(255,107,107,0.2);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌍 全球地震显示系统 | 真实昼夜模拟</h1>
        <div class="subtitle">数据来源：USGS | 支持灵活筛选时间范围和震级 | 红点大小=震级 | 光照基于真实世界时间动态变化</div>
        <div class="time-info" id="realTimeDisplay">🕒 加载时间...</div>
    </div>

    <div class="maps-container">
        <div class="globe-box" id="globeContainer">
            <div class="map-label">🌐 3D 球形地球 (动态日照·真实昼夜)</div>
            <div class="light-tip" id="sunPosTip">☀️ 太阳方向计算中...</div>
        </div>
        <div class="mercator-box" id="mercatorContainer">
            <div class="map-label">🗺️ 墨卡托投影世界地图 (红点大小=震级)</div>
        </div>
    </div>

    <div class="data-section">
        <div class="filter-panel">
            <div class="filter-title">🔍 地震数据筛选</div>
            <div class="filter-grid">
                <div class="filter-group">
                    <label class="filter-label">起始日期</label>
                    <input type="date" id="filterStartDate" class="filter-input" />
                </div>
                <div class="filter-group">
                    <label class="filter-label">结束日期</label>
                    <input type="date" id="filterEndDate" class="filter-input" />
                </div>
                <div class="filter-group">
                    <label class="filter-label">最小震级 (M)</label>
                    <input type="number" id="filterMinMag" class="filter-input" min="0" step="0.1" placeholder="如：0、5.5等" />
                </div>
                <div class="filter-group">
                    <label class="filter-label">最大震级 (M)</label>
                    <input type="number" id="filterMaxMag" class="filter-input" min="0" step="0.1" placeholder="如：9.0" />
                </div>
            </div>
                        <div class="filter-buttons">
                                <label style="display:flex;align-items:center;gap:8px;">
                                    <input type="checkbox" id="domesticOnlyToggle" />
                                    <span style="color:#ccc;font-size:13px;">显示国内地震</span>
                                </label>
                                <div style="flex:1"></div>
                                <div style="display:flex;gap:10px;">
                                    <button class="filter-btn filter-btn-apply" id="filterApplyBtn">🔎 应用筛选</button>
                                    <button class="filter-btn filter-btn-reset" id="filterResetBtn">↻ 重置条件</button>
                                </div>
                        </div>
                        <div id="filterMessage"></div>
        </div>
        <div class="stats" id="stats">
            <div class="stat-card"><div class="stat-number" id="totalCount">-</div><div class="stat-label">📊 地震总数</div></div>
            <div class="stat-card"><div class="stat-number" id="avgMagnitude">-</div><div class="stat-label">📈 平均震级</div></div>
            <div class="stat-card"><div class="stat-number" id="maxMagnitude">-</div><div class="stat-label">⚠️ 最大震级</div></div>
        </div>
        <div class="quake-list">
            <div class="quake-header"><span>震级</span><span>地点</span><span>时间</span><span>海啸</span></div>
            <div id="quakeList" class="loading">加载地震数据中...</div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // 存储地震数据用于标注
        let currentEarthquakes = [];
        
        const container = document.getElementById('globeContainer');
        const width = container.clientWidth;
        const height = container.clientHeight;
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010118);
        scene.fog = new THREE.FogExp2(0x010118, 0.0008);
        
        const camera = new THREE.PerspectiveCamera(45, width/height, 0.1, 1000);
        camera.position.set(0, 0, 3.2);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(width, height);
        renderer.shadowMap.enabled = false;
        container.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.rotateSpeed = 0.8;
        controls.zoomSpeed = 0.8;
        
        // 星空粒子
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 2000;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 2000;
            starPositions[i*3+1] = (Math.random() - 0.5) * 2000;
            starPositions[i*3+2] = (Math.random() - 0.5) * 300 - 150;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.35, transparent: true, opacity: 0.8 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        const textureLoader = new THREE.TextureLoader();
        const earthMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
        const earthSpecularMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_specular_2048.jpg');
        const earthNormalMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg');
        const cloudMap = textureLoader.load('https://threejs.org/examples/textures/planets/earth_clouds_1024.png');
        
        const earthMat = new THREE.MeshPhongMaterial({ 
            map: earthMap, 
            specularMap: earthSpecularMap, 
            specular: new THREE.Color(0x333333), 
            shininess: 8,
            normalMap: earthNormalMap
        });
        const earth = new THREE.Mesh(new THREE.SphereGeometry(1, 128, 128), earthMat);
        scene.add(earth);
        
        const cloudMat = new THREE.MeshPhongMaterial({ 
            map: cloudMap, 
            transparent: true, 
            opacity: 0.12, 
            blending: THREE.AdditiveBlending 
        });
        const clouds = new THREE.Mesh(new THREE.SphereGeometry(1.008, 128, 128), cloudMat);
        scene.add(clouds);
        
        const ambientLight = new THREE.AmbientLight(0x111122, 0.8);
        scene.add(ambientLight);
        
        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.35);
        sunLight.position.set(5, 3, 5);
        sunLight.target = earth;
        scene.add(sunLight);
        
        const backFillLight = new THREE.PointLight(0x4466aa, 2);
        backFillLight.position.set(-2, -1, -2.5);
        scene.add(backFillLight);
        
        const rimLight = new THREE.PointLight(0x88aaff, 0.5);
        rimLight.position.set(1, 1.5, -2);
        scene.add(rimLight);
        
        let quakeMarkers = null;
        
        function getMarkerSize(mag) {
            const base = 0.014;
            const scale = Math.pow(2, (mag - 5.5) / 2.2);
            return Math.min(base * scale, 0.11);
        }
        
        function latLonToVector3(lat, lon, radius = 1.001) {
            const phi = (90 - lat) * Math.PI / 180;
            const theta = -lon * Math.PI / 180;
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.cos(phi);
            const z = radius * Math.sin(phi) * Math.sin(theta);
            return new THREE.Vector3(x, y, z);
        }
        
        function updateGlobeMarkers(earthquakes) {
            if (quakeMarkers) {
                scene.remove(quakeMarkers);
                if (quakeMarkers.geometry) quakeMarkers.geometry.dispose();
                if (quakeMarkers.material) quakeMarkers.material.dispose();
            }
            if (!earthquakes || earthquakes.length === 0) return;
            
            const validQuakes = earthquakes.filter(q => {
                const coords = q.geometry.coordinates;
                return coords && !isNaN(coords[0]) && !isNaN(coords[1]);
            });
            if (validQuakes.length === 0) return;
            
            const group = new THREE.Group();
            validQuakes.forEach(quake => {
                const coords = quake.geometry.coordinates;
                const lon = coords[0];
                const lat = coords[1];
                const mag = quake.properties.mag;
                const size = getMarkerSize(mag);
                const position = latLonToVector3(lat, lon, 1.002);
                
                const material = new THREE.MeshStandardMaterial({
                    color: 0xff4444,
                    emissive: 0x331100,
                    emissiveIntensity: 0.2,
                    roughness: 0.3,
                    metalness: 0.05
                });
                const sphere = new THREE.Mesh(new THREE.SphereGeometry(size, 18, 18), material);
                sphere.position.copy(position);
                group.add(sphere);
            });
            quakeMarkers = group;
            scene.add(quakeMarkers);
        }
        
        window.updateGlobeMarkers = updateGlobeMarkers;
        
        // ---------- 辅助：经纬度格式化 (南北纬 / 东西经) ----------
        function formatLatLon(lat, lon) {
            const latAbs = Math.abs(lat).toFixed(1);
            const latDir = lat >= 0 ? 'N' : 'S';
            const lonAbs = Math.abs(lon).toFixed(1);
            const lonDir = lon >= 0 ? 'W' : 'E';
            return `${latAbs}°${latDir} , ${lonAbs}°${lonDir}`;
        }
        
        // 获取太阳直射点经纬度 (返回数值)
        function getSubSolarPointLatLon() {
            const now = new Date();
            const utcHours = now.getUTCHours();
            const utcMinutes = now.getUTCMinutes();
            const utcSeconds = now.getUTCSeconds();
            const dayOfYear = Math.floor((now.getTime() - new Date(Date.UTC(now.getUTCFullYear(), 0, 1, 0, 0, 0)).getTime()) / (24 * 3600 * 1000)) + 1;
            const deltaDeg = -23.439 * Math.cos(2 * Math.PI / 365.25 * (dayOfYear + 10));
            const utcDecimal = utcHours + utcMinutes/60 + utcSeconds/3600;
            let lonDeg = (utcDecimal - 12) * 15;
            if (lonDeg > 180) lonDeg -= 360;
            if (lonDeg < -180) lonDeg += 360;
            return { lat: deltaDeg, lon: lonDeg };
        }
        
        // 计算太阳方向向量 (用于光照)
        function getSolarDirectionVector() {
            const now = new Date();
            const utcYear = now.getUTCFullYear();
            const utcMonth = now.getUTCMonth();
            const utcDate = now.getUTCDate();
            const utcHours = now.getUTCHours();
            const utcMinutes = now.getUTCMinutes();
            const utcSeconds = now.getUTCSeconds();
            
            const startOfYear = new Date(Date.UTC(utcYear, 0, 1, 0, 0, 0));
            const dayOfYear = Math.floor((now.getTime() - startOfYear.getTime()) / (24 * 3600 * 1000)) + 1;
            
            const obliquityDeg = 23.439;
            const rad = Math.PI / 180;
            const deltaRad = -obliquityDeg * rad * Math.cos(2 * Math.PI / 365.25 * (dayOfYear + 10));
            
            const utcDecimalHour = utcHours + utcMinutes / 60 + utcSeconds / 3600;
            let subSolarLonDeg = (12 - utcDecimalHour) * -15;
            if (subSolarLonDeg > 180) subSolarLonDeg -= 360;
            if (subSolarLonDeg < -180) subSolarLonDeg += 360;
            const subSolarLonRad = subSolarLonDeg * rad;
            const subSolarLatRad = deltaRad;
            
            const cosLat = Math.cos(subSolarLatRad);
            const x = cosLat * Math.cos(subSolarLonRad);
            const y = Math.sin(subSolarLatRad);
            const z = cosLat * Math.sin(subSolarLonRad);
            
            return new THREE.Vector3(x, y, z).normalize();
        }
        
        let lastUpdateSecond = -1;
        function updateRealTimeSunlight() {
            const now = new Date();
            const currentSec = Math.floor(now.getTime() / 1000);
            if (currentSec === lastUpdateSecond) return;
            lastUpdateSecond = currentSec;
            
            const sunDir = getSolarDirectionVector();
            const distance = 8.5;
            const lightPos = sunDir.clone().multiplyScalar(distance);
            sunLight.position.copy(lightPos);
            sunLight.target = earth;
            sunLight.updateMatrixWorld();
            
            const sunY = sunDir.y;
            let ambientIntensity = 0.55;
            let backFillIntensity = 0.45;
            let rimIntensity = 0.4;
            if (sunY < -0.2) {
                ambientIntensity = 0.75;
                backFillIntensity = 0.8;
                rimIntensity = 0.65;
            } else if (sunY < 0.2) {
                ambientIntensity = 0.5;
                backFillIntensity = 0.42;
                rimIntensity = 0.38;
            } else {
                ambientIntensity = 0.55;
                backFillIntensity = 0.45;
                rimIntensity = 0.4;
            }
            ambientLight.intensity = ambientIntensity;
            backFillLight.intensity = backFillIntensity;
            rimLight.intensity = rimIntensity;
            
            const intensityBase = 1.3;
            const sunHeightFactor = Math.max(0.2, Math.min(1.2, (sunY + 0.5) * 0.9 + 0.6));
            sunLight.intensity = intensityBase * sunHeightFactor;
            
            // 更新tip，使用南北纬/东西经格式
            const subPoint = getSubSolarPointLatLon();
            const tipDiv = document.getElementById('sunPosTip');
            if (tipDiv) {
                tipDiv.innerHTML = `☀️ 实时日照 | 直射点: ${formatLatLon(subPoint.lat, subPoint.lon)}<br>🕒 基于UTC时间`;
            }
        }
        // 更新时间显示 (也使用南北纬/东西经)
        function updateUITime() {
            const now = new Date();
            const utcStr = now.toUTCString();
            const sub = getSubSolarPointLatLon();
            const el = document.getElementById('realTimeDisplay');
            if (el) {
                el.innerHTML = `🕒 ${utcStr} | ☀️ 太阳直射: ${formatLatLon(sub.lat, sub.lon)}`;
            }
        }
        
        function animate() {
            requestAnimationFrame(animate);
            updateRealTimeSunlight();
            updateUITime();
            
            clouds.rotation.y += 0.0008;
            stars.rotation.y += 0.00015;
            stars.rotation.x += 0.00005;
            
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            const newW = container.clientWidth, newH = container.clientHeight;
            camera.aspect = newW / newH;
            camera.updateProjectionMatrix();
            renderer.setSize(newW, newH);
        });
        
        setTimeout(() => {
            updateRealTimeSunlight();
            updateUITime();
        }, 100);
        
        window.updateGlobeMarkers = updateGlobeMarkers;
    </script>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3.0.2/dist/topojson.min.js"></script>
    <script>
        // 墨卡托地图相关变量
        let mercatorSvg = null;
        let currentProjection = null;
        let worldDataCache = null;
        
        (function() {
            const container = document.getElementById('mercatorContainer');
            let width = container.clientWidth, height = container.clientHeight;
            mercatorSvg = d3.select("#mercatorContainer").append("svg").attr("width", width).attr("height", height).style("background", "#d9e9ff");
            
            function drawBaseMap() {
                width = container.clientWidth; height = container.clientHeight;
                mercatorSvg.attr("width", width).attr("height", height);
                currentProjection = d3.geoMercator().scale((width / 2 / Math.PI) * 0.85).translate([width/2, height/2]);
                const path = d3.geoPath().projection(currentProjection);
                
                fetch('https://cdn.jsdelivr.net/npm/world-atlas@2.0.2/countries-50m.json')
                    .then(res => res.json())
                    .then(world => {
                        worldDataCache = world;
                        const countries = topojson.feature(world, world.objects.countries);
                        mercatorSvg.selectAll(".country").remove();
                        mercatorSvg.selectAll(".country-border").remove();
                        mercatorSvg.selectAll(".graticule").remove();
                        mercatorSvg.selectAll(".equator").remove();
                        
                        mercatorSvg.selectAll(".country").data(countries.features).enter().append("path")
                            .attr("class", "country")
                            .attr("d", path).attr("fill", "#b8d4e3").attr("stroke", "#6a8e9b").attr("stroke-width", 0.5);
                        
                        const graticule = d3.geoGraticule().step([15,15]);
                        mercatorSvg.append("path").attr("class", "graticule").datum(graticule).attr("d", path).attr("fill", "none").attr("stroke", "#aaccdd").attr("stroke-width", 0.5).attr("stroke-dasharray", "3 3");
                        const equator = { type: "LineString", coordinates: [[-180,0],[180,0]] };
                        mercatorSvg.append("path").attr("class", "equator").datum(equator).attr("d", path).attr("fill", "none").attr("stroke", "#e34d4d").attr("stroke-width", 1.2);
                        
                        if (window.currentEarthquakeData && window.currentEarthquakeData.length > 0) {
                            updateMercatorMarkers(window.currentEarthquakeData);
                        }
                    }).catch(() => {
                        mercatorSvg.append("text").attr("x", width/2).attr("y", height/2).attr("text-anchor", "middle").text("地图加载失败，请检查网络").attr("fill", "#555");
                    });
            }
            
            drawBaseMap();
            window.addEventListener('resize', () => drawBaseMap());
        })();
        
        function updateMercatorMarkers(earthquakes) {
            if (!mercatorSvg || !currentProjection) return;
            mercatorSvg.selectAll(".quake-marker").remove();
            if (!earthquakes || earthquakes.length === 0) return;
            
            const projection = currentProjection;
            const width = parseFloat(mercatorSvg.attr("width"));
            const height = parseFloat(mercatorSvg.attr("height"));
            
            earthquakes.forEach(quake => {
                const coords = quake.geometry.coordinates;
                const lon = coords[0];
                const lat = coords[1];
                const mag = quake.properties.mag;
                const screenCoords = projection([lon, lat]);
                if (!screenCoords) return;
                const x = screenCoords[0];
                const y = screenCoords[1];
                if (x < -50 || x > width + 50 || y < -50 || y > height + 50) return;
                
                const radius = Math.min(5 * Math.pow(1.65, mag - 5.5), 34);
                const group = mercatorSvg.append("g").attr("class", "quake-marker");
                group.append("circle")
                    .attr("cx", x)
                    .attr("cy", y)
                    .attr("r", radius)
                    .attr("fill", "#ff3333")
                    .attr("stroke", "#ffffff")
                    .attr("stroke-width", 0.8)
                    .attr("opacity", 0.9);
                if (mag >= 6) {
                    group.append("text")
                        .attr("x", x + radius + 3)
                        .attr("y", y - 3)
                        .attr("fill", "#ff8888")
                        .attr("font-size", "9px")
                        .attr("font-weight", "bold")
                        .attr("stroke", "#fff")
                        .attr("stroke-width", 0.3)
                        .text(mag.toFixed(1));
                }
                group.append("title")
                    .text(`${quake.properties.place}\n震级: M${mag.toFixed(1)}\n时间: ${new Date(quake.properties.time).toLocaleString()}`);
            });
        }
        
        window.updateMercatorMarkers = updateMercatorMarkers;
    </script>

    <script>
        // 计算过去3年的日期范围
        const endDate = new Date();
        const startDate = new Date();
        startDate.setFullYear(endDate.getFullYear() - 3);
        
        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // 动态构造API URL
        function buildEarthquakeApiUrl(queryStartDate, queryEndDate, queryMinMag) {
            const formattedStart = formatDate(new Date(queryStartDate));
            const formattedEnd = formatDate(new Date(queryEndDate));
            const minMag = Math.max(0, queryMinMag || 5.5); // 最小允许为0
            return `https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&starttime=${formattedStart}&endtime=${formattedEnd}&minmagnitude=${minMag}`;
        }
        
        const starttime = formatDate(startDate);
        const endtime = formatDate(endDate);
        const apiUrl = buildEarthquakeApiUrl(startDate, endDate, 5.5);
        
        window.currentEarthquakeData = [];
        
        function getMagnitudeClass(mag) {
            if (mag >= 7) return 'm-strong';
            if (mag >= 6) return 'm-mid';
            return 'm-light';
        }
        
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
        }
        
        function updateStats(quakes) {
            if (!quakes || quakes.length === 0) {
                document.getElementById('totalCount').textContent = '0';
                document.getElementById('avgMagnitude').textContent = '-';
                document.getElementById('maxMagnitude').textContent = '-';
                return;
            }
            const total = quakes.length;
            let sumMag = 0, maxMag = 0;
            for (const q of quakes) {
                const mag = q.properties.mag;
                sumMag += mag;
                if (mag > maxMag) maxMag = mag;
            }
            document.getElementById('totalCount').textContent = total;
            document.getElementById('avgMagnitude').textContent = (sumMag / total).toFixed(1);
            document.getElementById('maxMagnitude').textContent = maxMag.toFixed(1);
        }
        
        async function displayEarthquakes(data) {
            let quakes = data.features;
            const quakeListDiv = document.getElementById('quakeList');
            if (!quakes || quakes.length === 0) {
                quakeListDiv.innerHTML = '<div class="loading">📭 暂无地震数据</div>';
                return;
            }
            
            // 检查是否仅显示国内地震
            const domesticOnlyEnabled = document.getElementById('domesticOnlyToggle')?.checked;
            if (domesticOnlyEnabled) {
                console.log(`[displayEarthquakes] filtering to domestic earthquakes only, total: ${quakes.length}`);
                quakes = await filterDomesticEarthquakes(quakes);
                console.log(`[displayEarthquakes] after filtering: ${quakes.length}`);
                
                if (quakes.length === 0) {
                    quakeListDiv.innerHTML = '<div class="loading">📭 筛选后暂无国内地震数据</div>';
                    updateStats([]);
                    return;
                }
            }
            
            // 更新全局数据，确保点击时索引匹配
            window.currentEarthquakeData = quakes;
            
            // 先显示原始英文地名
            let html = '';
            for (let i = 0; i < quakes.length; i++) {
                const quake = quakes[i];
                const props = quake.properties;
                const mag = props.mag;
                const isMajor = mag >= 7;
                const clickAttr = isMajor ? ` onclick="showQuakeDetail(${i})"` : '';
                const classAttr = isMajor ? ' class="quake-item quake-item-major"' : ' class="quake-item"';
                const placeText = props.place || '未知地点';
                const placeEsc = placeText.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
                html += `
                    <div${classAttr}${clickAttr} data-quake-index="${i}">
                        <div><span class="magnitude ${getMagnitudeClass(mag)}">M${mag.toFixed(1)}${isMajor ? ' ⭐' : ''}</span></div>
                        <div class="place" data-orig-place="${placeEsc}" data-lat="${quake.geometry.coordinates[1]}" data-lng="${quake.geometry.coordinates[0]}">📍 ${placeEsc}</div>
                        <div class="time">🕐 ${formatTime(props.time)}</div>
                        <div><span class="tsunami ${props.tsunami === 1 ? 'tsunami-yes' : 'tsunami-no'}">${props.tsunami === 1 ? '⚠️ 有' : '无'}</span></div>
                    </div>
                `;
            }
            quakeListDiv.innerHTML = html;
            
            // 翻译国内地震地点名（非阻塞）
            try {
                if (domesticOnlyEnabled) translateVisiblePlacesWithAmap();
            } catch (e) { console.warn('translateVisiblePlacesWithAmap error', e); }
        }

        // 翻译相关工具与缓存
        const PLACE_TRANSLATION_CACHE_KEY = 'placeTranslations_v1';
        
        // 百度翻译 API 配置
        const BAIDU_TRANSLATE_CONFIG = {
            appId: '20260417002596654',
            secret: 'zAjlCqWP3MbVuiXzwMyX',
            url: 'https://api.fanyi.baidu.com/api/trans/vip/translate'
        };

        // 高德地图配置
        const AMAP_CONFIG = {
            key: 'f1f6aa55ebd83d9d79f187965c06c5a6',
            url: 'https://restapi.amap.com/v3/geocode/regeo'
        };

        function loadTranslationCache() {
            try {
                const raw = localStorage.getItem(PLACE_TRANSLATION_CACHE_KEY);
                return raw ? JSON.parse(raw) : {};
            } catch (e) { return {}; }
        }

        function saveTranslationCache(cache) {
            try { localStorage.setItem(PLACE_TRANSLATION_CACHE_KEY, JSON.stringify(cache)); } catch (e) { }
        }

        function containsChinese(text) {
            return /[\u4e00-\u9fff]/.test(text);
        }

        // 检查地震是否在中国境内
        async function isChinaDomesticEarthquake(lat, lng) {
            try {
                const amapResult = await getAddressFromCoords(lat, lng);
                if (!amapResult) return false;
                
                const province = amapResult.province || '';
                const city = amapResult.city || '';
                
                const isDomestic = province && province.trim() !== '' && province !== '国外' && province !== '未知'
                                && city && city.trim() !== '' && city !== '国外' && city !== '未知';
                
                console.log(`[isChinaDomesticEarthquake] lat=${lat}, lng=${lng}, province="${province}", city="${city}", isDomestic=${isDomestic}`);
                return isDomestic;
            } catch (e) {
                console.warn(`[isChinaDomesticEarthquake] error:`, e.message);
                return false;
            }
        }

        // 批量过滤国内地震
        async function filterDomesticEarthquakes(quakes) {
            const domestic = [];
            const batchSize = 10;
            
            for (let i = 0; i < quakes.length; i += batchSize) {
                const batch = quakes.slice(i, i + batchSize);
                const results = await Promise.all(
                    batch.map(async quake => {
                        const lat = quake.geometry.coordinates[1];
                        const lng = quake.geometry.coordinates[0];
                        const isDomestic = await isChinaDomesticEarthquake(lat, lng);
                        return isDomestic ? quake : null;
                    })
                );
                domestic.push(...results.filter(q => q !== null));
            }
            
            return domestic;
        }

        // 生成百度翻译所需的 MD5 签名
        function generateBaiduSign(query, salt) {
            const str = BAIDU_TRANSLATE_CONFIG.appId + query + salt + BAIDU_TRANSLATE_CONFIG.secret;
            return CryptoJS.MD5(str).toString();
        }

        // 调用高德逆地理编码 API（获取坐标的中文地址信息）
        async function getAddressFromCoords(lat, lng) {
            try {
                console.log(`[amap] requesting reverse geocode for (${lng}, ${lat})`);
                const response = await fetch(
                    `${AMAP_CONFIG.url}?location=${lng},${lat}&key=${AMAP_CONFIG.key}&extensions=all`,
                    { timeout: 5000 }
                );
                if (!response.ok) {
                    console.warn(`[amap] HTTP ${response.status}`);
                    return null;
                }
                const data = await response.json();
                if (data.status === '1' && data.regeocode) {
                    const addr = data.regeocode.formatted_address || '';
                    const province = data.regeocode.addressComponent?.province || '';
                    const city = data.regeocode.addressComponent?.city || '';
                    const district = data.regeocode.addressComponent?.district || '';
                    console.log(`[amap] success: ${addr}`);
                    return { full: addr, province, city, district };
                } else {
                    console.warn(`[amap] no result, status=${data.status}`);
                    return null;
                }
            } catch (e) {
                console.warn(`[amap] error:`, e.message);
                return null;
            }
        }

        // 调用百度翻译 API
        async function translatePlace(text) {
            if (!text) return text;
            if (containsChinese(text)) return text;

            const cache = loadTranslationCache();
            if (cache[text]) {
                console.log(`[translate] cache hit: "${text}" => "${cache[text]}"`);
                return cache[text];
            }

            try {
                const salt = Date.now();
                const sign = generateBaiduSign(text, salt);
                
                console.log(`[translate] calling Baidu API for "${text}"`);
                const response = await fetch(BAIDU_TRANSLATE_CONFIG.url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        q: text,
                        from: 'auto',
                        to: 'zh',
                        appid: BAIDU_TRANSLATE_CONFIG.appId,
                        salt: salt,
                        sign: sign
                    })
                });

                if (!response.ok) {
                    console.warn(`[translate] Baidu API returned HTTP ${response.status}`);
                    return text;
                }

                const result = await response.json();
                console.log(`[translate] Baidu response:`, result);
                if (result.trans_result && result.trans_result[0]) {
                    const translated = result.trans_result[0].dst;
                    if (!translated || translated.trim() === '') {
                        console.warn(`[translate] Baidu returned empty string for "${text}", using original`);
                        return text;
                    }
                    console.log(`[translate] success: "${text}" => "${translated}"`);
                    cache[text] = translated;
                    saveTranslationCache(cache);
                    return translated;
                } else {
                    console.warn(`[translate] Baidu response has no trans_result for "${text}":`, result);
                    return text;
                }
            } catch (e) {
                console.warn(`[translate] error for "${text}":`, e.message);
                return text;
            }
        }

        // 优化的地点翻译：仅国内地震翻译为中文，国外一律显示英文
        async function translateLocationWithAmap(lat, lng, originalPlace) {
            console.log(`[translateLocationWithAmap] start: lat=${lat}, lng=${lng}, orig="${originalPlace}"`);
            
            try {
                // 尝试高德逆地理编码
                const amapResult = await getAddressFromCoords(lat, lng);
                console.log(`[translateLocationWithAmap] amap result:`, amapResult);
                
                if (amapResult) {
                    // 获取有意义的地址信息：省 市 县（去除空字符串）
                    const parts = [
                        amapResult.province,
                        amapResult.city,
                        amapResult.district
                    ].filter(s => s && s.trim() !== '' && s !== '国外' && s !== '未知');
                    
                    // 拼接后的字符串
                    const addressStr = parts.join(' ').trim();
                    
                    // 只有拼接结果非空且有实际意义，才使用高德结果（国内地震）
                    if (addressStr && addressStr.length > 0) {
                        console.log(`[translateLocationWithAmap] domestic earthquake, using amap: ${addressStr}`);
                        return addressStr;
                    } else {
                        console.log(`[translateLocationWithAmap] amap returned foreign or empty result, keeping english`);
                    }
                } else {
                    console.log(`[translateLocationWithAmap] amap returned null, keeping english`);
                }
            } catch (e) {
                console.warn(`[translateLocationWithAmap] amap exception:`, e.message);
            }

            // 国外地震一律显示英文原文，不进行翻译
            console.log(`[translateLocationWithAmap] foreign earthquake or amap failed, returning original: "${originalPlace}"`);
            return originalPlace;
        }

        // 解析类似 "140 km E of Place, Country" 的格式并翻译其中的地点/国家，保留距离与方向
        async function parseAndTranslateLocation(text) {
            if (!text) {
                console.log(`[parseAndTranslateLocation] empty input`);
                return text;
            }
            
            const pattern = /^(\d+(?:\.\d+)?)\s*km\s*([NSEW]{1,2})\s*of\s*(.+)$/i;
            const m = text.match(pattern);
            
            if (!m) {
                console.log(`[parseAndTranslateLocation] pattern not matched for "${text}", calling translatePlace directly`);
                const result = await translatePlace(text);
                console.log(`[parseAndTranslateLocation] translatePlace result: "${result}"`);
                return result;
            }
            
            const distance = m[1];
            const dir = m[2].toUpperCase();
            const rest = m[3].trim();
            const parts = rest.split(',').map(s => s.trim()).filter(Boolean);
            const placeName = parts[0] || rest;
            const country = parts.length > 1 ? parts.slice(1).join(', ') : '';

            console.log(`[parseAndTranslateLocation] matched: distance=${distance}, dir=${dir}, place="${placeName}", country="${country}"`);

            // 翻译地名与国家（并行）
            const [placeTr, countryTr] = await Promise.all([
                translatePlace(placeName),
                country ? translatePlace(country) : Promise.resolve('')
            ]);

            console.log(`[parseAndTranslateLocation] after translate: place="${placeTr}", country="${countryTr}"`);

            const dirMap = { N: '以北', S: '以南', E: '以东', W: '以西', NE: '以东北', NW: '以西北', SE: '以东南', SW: '以西南' };
            const dirZh = dirMap[dir] || ('以' + dir);

            // 组合中文表达：地名（国家）以东140公里
            let result = placeTr;
            if (countryTr) result = `${placeTr}（${countryTr}）`;
            result = `${result}${dirZh}${distance}公里`;
            console.log(`[parseAndTranslateLocation] final result: "${result}"`);
            return result;
        }

        async function translateVisiblePlacesWithAmap() {
            const elems = Array.from(document.querySelectorAll('.place[data-orig-place][data-lat][data-lng]'));
            console.log(`[translateList] starting with ${elems.length} elements`);
            if (!elems.length) return;
            const cache = loadTranslationCache();
            const batchSize = 3; // 高德API限制，减小并发数
            
            for (let i = 0; i < elems.length; i += batchSize) {
                const batch = elems.slice(i, i + batchSize).map(async el => {
                    try {
                        const orig = el.getAttribute('data-orig-place') || '';
                        const lat = parseFloat(el.getAttribute('data-lat'));
                        const lng = parseFloat(el.getAttribute('data-lng'));
                        
                        if (!orig || isNaN(lat) || isNaN(lng)) {
                            console.log(`[translateList] skip: orig="${orig}", lat=${lat}, lng=${lng}`);
                            return;
                        }
                        if (containsChinese(orig)) {
                            console.log(`[translateList] already chinese: "${orig}"`);
                            return;
                        }
                        
                        // 检查缓存
                        if (cache[orig]) {
                            console.log(`[translateList] cache hit: "${orig}" => "${cache[orig]}"`);
                            const displayText = '📍 ' + cache[orig];
                            el.innerHTML = displayText;
                            console.log(`[translateList] DOM updated (cache): el.innerHTML = "${displayText}"`);
                            return;
                        }
                        
                        // 调用新的统一翻译函数
                        console.log(`[translateList] calling translateLocationWithAmap for: "${orig}"`);
                        const translated = await translateLocationWithAmap(lat, lng, orig);
                        console.log(`[translateList] translateLocationWithAmap returned: "${translated}"`);
                        
                        // 验证结果
                        if (!translated) {
                            console.warn(`[translateList] translateLocationWithAmap returned falsy: "${translated}"`);
                        } else if (translated === '') {
                            console.warn(`[translateList] translateLocationWithAmap returned empty string`);
                        }
                        
                        cache[orig] = translated;
                        saveTranslationCache(cache);
                        const displayText = '📍 ' + translated;
                        el.innerHTML = displayText;
                        console.log(`[translateList] DOM updated: orig="${orig}" => displayed="${displayText}"`);
                    } catch (e) { 
                        const orig = el.getAttribute('data-orig-place') || '';
                        console.warn(`[translateList] error for "${orig}":`, e.message, e.stack);
                        // 显示原始文本作为备选
                        const displayText = '📍 ' + orig;
                        el.innerHTML = displayText;
                        console.log(`[translateList] DOM updated (error fallback): "${displayText}"`);
                    }
                });
                await Promise.all(batch);
            }
            console.log(`[translateList] translation batch complete`);
        }

        async function translateVisiblePlaces() {
            const elems = Array.from(document.querySelectorAll('.place[data-orig-place]'));
            if (!elems.length) return;
            const cache = loadTranslationCache();
            const batchSize = 5;
            for (let i = 0; i < elems.length; i += batchSize) {
                const batch = elems.slice(i, i + batchSize).map(async el => {
                    try {
                        const orig = el.getAttribute('data-orig-place') || '';
                        if (!orig) return;
                        if (containsChinese(orig)) return;
                        if (cache[orig]) {
                            el.innerHTML = '📍 ' + cache[orig];
                            return;
                        }
                        const translated = await parseAndTranslateLocation(orig);
                        el.innerHTML = '📍 ' + translated;
                    } catch (e) { /* ignore per-item errors */ }
                });
                await Promise.all(batch);
            }
        }

        // 显示地震详情弹窗
        async function showQuakeDetail(index) {
            const quake = window.currentEarthquakeData[index];
            if (!quake) return;

            const props = quake.properties;
            const geometry = quake.geometry;
            const originalPlace = props.place || '未知地点';
            const lat = geometry.coordinates[1];
            const lng = geometry.coordinates[0];
            
            // 统一使用新的翻译方法：先高德，后百度
            let placeText = originalPlace;
            try {
                const domesticOnlyEnabled = document.getElementById('domesticOnlyToggle')?.checked;
                if (domesticOnlyEnabled && originalPlace) {
                    placeText = await translateLocationWithAmap(lat, lng, originalPlace);
                }
            } catch (e) {
                console.warn('place translation failed', e);
            }

            // 设置标题（包含地点）
            document.getElementById('quakeDetailTitle').textContent = `M${props.mag.toFixed(1)} 级地震详情`;

            // 构建详情网格
            const detailGrid = document.getElementById('quakeDetailGrid');
            detailGrid.innerHTML = `
                <div class="quake-detail-item">
                    <div class="quake-detail-label">震级</div>
                    <div class="quake-detail-value">M${props.mag.toFixed(1)}</div>
                </div>
                <div class="quake-detail-item">
                    <div class="quake-detail-label">位置</div>
                    <div class="quake-detail-value">${placeText}</div>
                </div>
                <div class="quake-detail-item">
                    <div class="quake-detail-label">经度</div>
                    <div class="quake-detail-value">${geometry.coordinates[0].toFixed(4)}°</div>
                </div>
                <div class="quake-detail-item">
                    <div class="quake-detail-label">纬度</div>
                    <div class="quake-detail-value">${geometry.coordinates[1].toFixed(4)}°</div>
                </div>
                <div class="quake-detail-item">
                    <div class="quake-detail-label">深度</div>
                    <div class="quake-detail-value">${geometry.coordinates[2].toFixed(1)} km</div>
                </div>
                <div class="quake-detail-item">
                    <div class="quake-detail-label">时间</div>
                    <div class="quake-detail-value">${new Date(props.time).toLocaleString()}</div>
                </div>
                <div class="quake-detail-item">
                    <div class="quake-detail-label">海啸风险</div>
                    <div class="quake-detail-value">${props.tsunami === 1 ? '⚠️ 有海啸风险' : '无海啸风险'}</div>
                </div>
                <div class="quake-detail-item">
                    <div class="quake-detail-label">数据来源</div>
                    <div class="quake-detail-value">USGS</div>
                </div>
            `;

            // 构建描述内容
            const descriptionDiv = document.getElementById('quakeDetailDescription');
            let description = '<h4>📊 地震分析</h4>';

            if (props.mag >= 8.0) {
                description += '<p>这是一场极强地震（M≥8.0），属于破坏性地震中的最高级别。这种地震通常会造成严重破坏，可能引发海啸，并对全球产生影响。</p>';
            } else if (props.mag >= 7.0) {
                description += '<p>这是一场强地震（M7.0-7.9），属于大地震级别。这种地震可能造成严重破坏，特别是在人口密集地区或建筑质量较差的区域。</p>';
            }

            description += '<h4>📍 地理位置</h4>';
            description += `<p>地震发生于${placeText}，坐标为 (${geometry.coordinates[0].toFixed(4)}°E, ${geometry.coordinates[1].toFixed(4)}°N)，震源深度为${geometry.coordinates[2].toFixed(1)}公里。</p>`;

            description += '<h4>⚠️ 影响评估</h4>';
            if (props.tsunami === 1) {
                description += '<p>该地震已被标记为可能引发海啸。请注意沿海地区的安全预警，并遵循当地应急部门的指导。</p>';
            } else {
                description += '<p>该地震暂未被标记为海啸风险，但仍需关注余震和次生灾害。</p>';
            }

            description += '<h4>🔗 数据来源</h4>';
            description += '<p>本数据来源于美国地质勘探局（USGS）地震监测网络，提供全球地震实时监测服务。</p>';

            descriptionDiv.innerHTML = description;

            // 显示弹窗
            document.getElementById('quakeDetailModal').style.display = 'block';
        }

        // 关闭弹窗
        function closeQuakeDetail() {
            document.getElementById('quakeDetailModal').style.display = 'none';
        }

        // ESC键关闭弹窗（全局绑定）
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeQuakeDetail();
            }
        });

        // 筛选功能
        let originalEarthquakeData = [];

        function setFilterMessage(message, type = 'info') {
            const msgDiv = document.getElementById('filterMessage');
            msgDiv.innerHTML = message;
            msgDiv.className = `filter-message ${type}`;
        }

        function clearFilterMessage() {
            document.getElementById('filterMessage').innerHTML = '';
        }

        function getFilterValues() {
            const startDate = document.getElementById('filterStartDate').value;
            const endDate = document.getElementById('filterEndDate').value;
            const minMag = parseFloat(document.getElementById('filterMinMag').value) || 0;
            const maxMag = parseFloat(document.getElementById('filterMaxMag').value) || Infinity;
            return { startDate, endDate, minMag, maxMag };
        }

        function filterEarthquakes() {
            console.log('filterEarthquakes called');
            clearFilterMessage();
            const { startDate, endDate, minMag, maxMag } = getFilterValues();
            console.log('Filter values:', { startDate, endDate, minMag, maxMag });

            if (!startDate || !endDate) {
                setFilterMessage('❌ 请输入起始日期和结束日期', 'error');
                return;
            }

            if (new Date(startDate) > new Date(endDate)) {
                setFilterMessage('❌ 起始日期不能晚于结束日期', 'error');
                return;
            }

            if (minMag > maxMag) {
                setFilterMessage('❌ 最小震级不能大于最大震级', 'error');
                return;
            }

            // 从API重新加载指定条件的数据
            loadEarthquakesWithFilter(startDate, endDate, minMag, maxMag);
        }

        async function loadEarthquakesWithFilter(queryStartDate, queryEndDate, queryMinMag, queryMaxMag) {
            const quakeListDiv = document.getElementById('quakeList');
            try {
                quakeListDiv.innerHTML = '<div class="loading">⏳ 正在加载数据 (查询范围：' + queryStartDate + ' 至 ' + queryEndDate + ', 最小震级：M' + queryMinMag + ')...</div>';
                
                const newApiUrl = buildEarthquakeApiUrl(queryStartDate, queryEndDate, queryMinMag);
                const response = await fetch(newApiUrl);
                if (!response.ok) throw new Error('网络请求失败');
                const data = await response.json();
                let fetchedData = data.features || [];

                // 本地二次筛选最大震级
                const filtered = fetchedData.filter(quake => {
                    const mag = quake.properties.mag;
                    return mag <= queryMaxMag;
                });

                if (filtered.length > 2000) {
                    setFilterMessage(`❌ 符合条件的地震数据过多 (${filtered.length} 条 > 2000)，请调整筛选条件`, 'error');
                    quakeListDiv.innerHTML = '<div class="loading">📭 暂无数据</div>';
                    return;
                }

                if (filtered.length === 0) {
                    setFilterMessage('⚠️ 没有符合条件的数据', 'info');
                } else {
                    setFilterMessage(`✅ 筛选成功！共找到 ${filtered.length} 条数据`, 'success');
                }

                window.currentEarthquakeData = filtered;
                originalEarthquakeData = [...filtered];
                filtered.sort((a, b) => b.properties.mag - a.properties.mag);
                displayEarthquakes({ features: filtered });
                updateStats(filtered);
                if (window.updateGlobeMarkers) window.updateGlobeMarkers(filtered);
                if (window.updateMercatorMarkers) window.updateMercatorMarkers(filtered);
            } catch (error) {
                quakeListDiv.innerHTML = `<div class="error">❌ 加载失败：${error.message}<br>请检查网络连接或调整查询条件</div>`;
                setFilterMessage(`❌ 加载失败：${error.message}`, 'error');
                console.error('获取地震数据失败:', error);
            }
        }

        function resetFilter() {
            clearFilterMessage();
            
            // 重新加载默认数据
            initializeFilterDates();
            originalFetchEarthquakes();
        }

        // 等待DOM加载完成后再绑定事件
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, binding events');
            document.getElementById('filterApplyBtn').addEventListener('click', filterEarthquakes);
            document.getElementById('filterResetBtn').addEventListener('click', resetFilter);
            document.getElementById('quakeDetailClose').addEventListener('click', closeQuakeDetail);
            const modalEl = document.getElementById('quakeDetailModal');
            if (modalEl) {
                modalEl.addEventListener('click', function(e) {
                    if (e.target === this) closeQuakeDetail();
                });
            }
            
            // 初始化日期输入框为默认值（过去3年）
            initializeFilterDates();
            originalFetchEarthquakes();
        });

        // 修改原始的 fetchEarthquakes 函数来保存原始数据
        const originalFetchEarthquakes = async function fetchEarthquakes() {
            const quakeListDiv = document.getElementById('quakeList');
            try {
                quakeListDiv.innerHTML = '<div class="loading">⏳ 正在加载地震数据...</div>';
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('网络请求失败');
                const data = await response.json();
                originalEarthquakeData = data.features || [];
                window.currentEarthquakeData = [...originalEarthquakeData];
                window.currentEarthquakeData.sort((a, b) => b.properties.mag - a.properties.mag);
                
                displayEarthquakes({ features: window.currentEarthquakeData });
                updateStats(window.currentEarthquakeData);
                clearFilterMessage();
                setFilterMessage(`📊 已加载 ${window.currentEarthquakeData.length} 条地震数据`, 'info');
                
                if (window.updateGlobeMarkers) window.updateGlobeMarkers(window.currentEarthquakeData);
                if (window.updateMercatorMarkers) window.updateMercatorMarkers(window.currentEarthquakeData);
            } catch (error) {
                quakeListDiv.innerHTML = `<div class="error">❌ 加载失败：${error.message}<br>请检查网络连接</div>`;
                console.error('获取地震数据失败:', error);
            }
        };

        // 初始化日期输入框为默认值（过去3年）
        function initializeFilterDates() {
            const endDate = new Date();
            const startDate = new Date();
            startDate.setFullYear(endDate.getFullYear() - 3);
            
            const formatDate = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };
            
            document.getElementById('filterStartDate').value = formatDate(startDate);
            document.getElementById('filterEndDate').value = formatDate(endDate);
            document.getElementById('filterMinMag').value = '5.5';
        }

        setInterval(originalFetchEarthquakes, 24 * 60 * 60 * 1000);
    </script>

    <!-- 地震详情弹窗 -->
    <div class="quake-detail-modal" id="quakeDetailModal">
        <div class="quake-detail-content">
            <div class="quake-detail-header">
                <div class="quake-detail-title" id="quakeDetailTitle">地震详情</div>
                <button class="quake-detail-close" id="quakeDetailClose">&times;</button>
            </div>
            <div class="quake-detail-grid" id="quakeDetailGrid">
                <!-- 详情内容将通过JavaScript动态填充 -->
            </div>
            <div class="quake-detail-description" id="quakeDetailDescription">
                <!-- 描述内容将通过JavaScript动态填充 -->
            </div>
        </div>
    </div>
</body>
</html>
